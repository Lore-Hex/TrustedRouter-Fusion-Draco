<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter,Arial,sans-serif"><rect width="1200" height="630" fill="#ffffff"/><rect x="0" y="0" width="14" height="630" fill="#1D9E75"/><text x="70" y="170" font-size="34" font-weight="700" fill="#0F6E56">SELF-FUSION ON DRACO</text><text x="68" y="270" font-size="78" font-weight="800" fill="#111827">Ten cheap runs</text><text x="68" y="352" font-size="78" font-weight="800" fill="#111827">fuse to nothing</text><text x="70" y="430" font-size="30" fill="#6b7280">A weak fuser averages its one right answer</text><text x="70" y="470" font-size="30" fill="#6b7280">away. A strong one keeps it.</text><text x="70" y="560" font-size="26" fill="#9a9890">Claude Haiku 4.5 vs Sonnet 4.6 · trustedrouter.com</text><line x1="700" y1="520" x2="1140" y2="520" stroke="#e5e7eb" stroke-width="2"/><polyline points="700,391 749,472 798,419 847,370 896,422 944,427 993,412 1042,453 1091,446 1140,427" fill="none" stroke="#D85A30" stroke-width="5"/><circle cx="700" cy="391" r="7" fill="#D85A30"/><circle cx="1140" cy="427" r="7" fill="#D85A30"/><text x="1146" y="433" font-size="26" font-weight="700" fill="#993C1D">Haiku</text><polyline points="700,272 749,264 798,222 847,205 896,245 944,208 993,209 1042,224 1091,210 1140,236" fill="none" stroke="#1D9E75" stroke-width="5"/><circle cx="700" cy="272" r="7" fill="#1D9E75"/><circle cx="1140" cy="236" r="7" fill="#1D9E75"/><text x="1146" y="242" font-size="26" font-weight="700" fill="#0F6E56">Sonnet</text><text x="700" y="554" font-size="22" fill="#9a9890">1 run</text><text x="1070" y="554" font-size="22" fill="#9a9890">10 runs</text></svg>